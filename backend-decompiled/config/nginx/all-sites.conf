            '"accept_language":"$http_accept_language",'
            '"accept_encoding":"$http_accept_encoding"'
        '}';map $http_upgrade $connection_upgrade {
    default upgrade;
    ''  close;
}server
{
    listen 80;
    listen 443 ssl;
    #listen 443 quic;
    http2 on;
    server_name merchant.vitaglobal.icu 101.132.17.37;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/project/merchant-web;
    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/101.132.17.37.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/101.132.17.37/*.conf;
    
    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/merchant-web/merchant.vitaglobal.icu.pem;
    ssl_certificate_key   /www/server/panel/vhost/cert/merchant-web/merchant.vitaglobal.icu.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    #SSL-END

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP引用配置，可以注释或修改
    include enable-php-00.conf;
    #PHP-INFO-END

    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/101.132.17.37.conf;
    #REWRITE-END

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }
    
    # 禁止访问的敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }
    access_log  /www/wwwlogs/101.132.17.37.log;
    error_log  /www/wwwlogs/101.132.17.37.error.log;
}# Production Admin Web Frontend on port 8086
server {
    listen 8086;
    server_name _;
    root /www/wwwroot/project/admin-web;
    index index.html;
    
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy to production Java backend
    location /app/ {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /dev-api/ {
        proxy_pass https://www.vitaglobal.icu/;
        proxy_set_header Host www.vitaglobal.icu;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /login {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /logout {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /captchaImage {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /getInfo {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /getRouters {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /system/ {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /common/ {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /monitor/ {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /tool/ {
        proxy_pass https://www.vitaglobal.icu;
        proxy_set_header Host www.vitaglobal.icu;
    }
    location /ai/ {
        proxy_pass http://127.0.0.1:8087/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    location /static/ {
        alias /www/wwwroot/project/admin-web/static/;
        gzip_static on;
        expires 7d;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
server {
    listen 80;
    server_name www.vitaglobal.icu vitaglobal.icu;
 
    # 重定向HTTP到HTTPS
    return 301 https://$server_name$request_uri;
}
server
{
    listen 443 ssl;
    #listen 443 quic;
    http2 on;
    server_name www.vitaglobal.icu;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/project;
    include /www/server/panel/vhost/nginx/extension/xiyou-admin8082/*.conf;
    #CERT-APPLY-CHECK--START
    # 用于SSL证书申请时的文件验证相关配置 -- 请勿删除
    include /www/server/panel/vhost/nginx/well-known/xiyou-admin8082.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL相关配置，请勿删除或修改下一行带注释的404规则
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    #ssl_certificate    /www/server/panel/vhost/cert/xiyou-admin/fullchain.pem;
    #ssl_certificate_key    /www/server/panel/vhost/cert/xiyou-admin/privkey.pem;
    ssl_certificate    /www/server/panel/vhost/cert/xiyou-admin/www.vitaglobal.icu.pem;
    ssl_certificate_key   /www/server/panel/vhost/cert/xiyou-admin/www.vitaglobal.icu.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_ecdh_curve secp384r1;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload";
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    error_page 497  https://$host$request_uri;

    #SSL-END
    

     #REWRITE-START 伪静态相关配置
    include /www/server/panel/vhost/rewrite/java_xiyou-admin8082.conf;
    #REWRITE-END

    #禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env) {
        return 404;
    }

    #一键申请SSL证书验证目录相关设置
    location /.well-known/ {
        root /www/wwwroot/java_node_ssl;
    }
    

    # 表单设计器操作手册静态页面
    #    location /static/web/ {
    #        alias /www/wwwroot/project/admin-web-prod/;
    #        index index.html;
    #        try_files $uri $uri/ /static/web/index.html;
    #        expires 1h;
    #    }

    # 商户入驻SOP静态页面
    location /merchant-sop/ {
        alias /www/wwwroot/project/h5/merchant-sop/;
        index index.html;
        expires 1h;
    }

    # 静态资源直接服务
    location /assets/ {
        alias /www/wwwroot/project/h5/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # AI Qwen服务反向代理
    location /ai/ {
        proxy_pass http://127.0.0.1:8087/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }


    # AI Form Assistant - serve latest version from filesystem (not from JAR)
    # AI Form Assistant - form templates data
    location = /static/js/form-templates.json {
        alias /www/wwwroot/project/admin-web/static/js/form-templates.json;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /static/js/ai-form-assistant.js {
        alias /www/wwwroot/project/admin-web-prod/static/js/ai-form-assistant.js;
        expires -1;
        add_header Cache-Control 'no-cache, must-revalidate';
    }

    # 反向代理配置
    location / {
        proxy_pass http://127.0.0.1:8082; # Java 应用运行端口，根据实际情况修改
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/html;
        sub_filter "</body></html>" "<script src=/static/js/ai-form-assistant.js?v=40></script></body></html>";
        sub_filter_once on;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    #STATIC-START 静态资源相关配置
    
    #STATIC-END

    #PROXY-LOCAl-START 代理本地服务的相关配置

    
    #PROXY-LOCAl-END

    access_log  /www/wwwlogs/xiyou-admin.log;
    error_log  /www/wwwlogs/xiyou-admin.error.log;
}
